version: "3.9"

services:
  ecotrack_db:
    image: postgres:15-alpine
    container_name: ecotrack_db
    environment:
      POSTGRES_USER: ecotrack_user
      POSTGRES_PASSWORD: ecotrack_pass
      POSTGRES_DB: ecotrack
    ports:
      - "35432:5432"
    volumes:
      - ecotrack_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ecotrack_user -d ecotrack"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - ecotrack_network

  ecotrack_redis:
    image: redis:7-alpine
    container_name: ecotrack_redis
    ports:
      - "36379:6379"
    volumes:
      - ecotrack_redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - ecotrack_network

  ecotrack_api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: ecotrack_api
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    ports:
      - "38000:8000"
    env_file:
      - .env
    depends_on:
      ecotrack_db:
        condition: service_healthy
      ecotrack_redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    volumes:
      - ./backend:/app
    networks:
      - ecotrack_network

  ecotrack_celery_worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: ecotrack_celery_worker
    command: celery -A app.celery_app worker --loglevel=info
    env_file:
      - .env
    depends_on:
      ecotrack_db:
        condition: service_healthy
      ecotrack_redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "celery", "-A", "app.celery_app", "inspect", "ping"]
      interval: 30s
      timeout: 10s
      retries: 3
    volumes:
      - ./backend:/app
    networks:
      - ecotrack_network

  ecotrack_celery_beat:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: ecotrack_celery_beat
    command: celery -A app.celery_app beat --loglevel=info
    env_file:
      - .env
    depends_on:
      ecotrack_db:
        condition: service_healthy
      ecotrack_redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "celery -A app.celery_app inspect ping || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
    volumes:
      - ./backend:/app
    networks:
      - ecotrack_network

  ecotrack_adminer:
    image: adminer
    container_name: ecotrack_adminer
    ports:
      - "38080:8080"
    depends_on:
      ecotrack_db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - ecotrack_network

volumes:
  ecotrack_postgres_data:
  ecotrack_redis_data:

networks:
  ecotrack_network:
    driver: bridge
